<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>图片压缩</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="拖入JPG图片，缩小到30%并压缩">
  <style>
    body { margin: 0; }
    #root { margin: 16px; }
    #drop-zone {
      border: 2px dashed #999;
      padding: 40px 20px;
      text-align: center;
      color: #666;
      cursor: pointer;
      margin-bottom: 16px;
    }
    #drop-zone.drag-over { border-color: #333; background: #f0f0f0; }
    .result-item {
      display: inline-block;
      margin: 8px;
      vertical-align: top;
      text-align: center;
    }
    .result-item img {
      max-width: 200px;
      max-height: 200px;
      display: block;
      border: 1px solid #ccc;
    }
    .result-item button {
      margin-top: 4px;
      cursor: pointer;
    }
    .info { font-size: 12px; color: #888; }
  </style>
</head>
<body>
<div id="root">
  <div>【工具说明】</div>
  <div>拖入JPG图片，自动缩小为原尺寸的30%并压缩。适合微信群二维码等含大面积纯色区域的图片。</div>
  <div id="drop-zone">将图片拖到此处，或点击选择文件
    <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" multiple style="display:none">
  </div>
  <div>
    <label>JPEG质量: <input type="range" id="quality" min="10" max="100" value="60"> <span id="quality-val">60</span>%</label>
    &nbsp;
    <label>缩放比例: <input type="range" id="scale" min="10" max="100" value="30"> <span id="scale-val">30</span>%</label>
  </div>
  <div id="results"></div>
</div>
<script>
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const results = document.getElementById('results');
  const qualityInput = document.getElementById('quality');
  const qualityVal = document.getElementById('quality-val');
  const scaleInput = document.getElementById('scale');
  const scaleVal = document.getElementById('scale-val');

  qualityInput.addEventListener('input', () => qualityVal.textContent = qualityInput.value);
  scaleInput.addEventListener('input', () => scaleVal.textContent = scaleInput.value);

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', () => handleFiles(fileInput.files));

  function handleFiles(files) {
    for (const file of files) {
      if (!file.type.startsWith('image/')) continue;
      compressImage(file);
    }
  }

  function compressImage(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = scaleInput.value / 100;
        const quality = qualityInput.value / 100;
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);

        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);

        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          const item = document.createElement('div');
          item.className = 'result-item';

          const preview = document.createElement('img');
          preview.src = url;

          const origKB = (file.size / 1024).toFixed(1);
          const newKB = (blob.size / 1024).toFixed(1);
          const ratio = (blob.size / file.size * 100).toFixed(1);

          const info = document.createElement('div');
          info.className = 'info';
          info.textContent = img.width + 'x' + img.height + ' → ' + w + 'x' + h + ' | ' + origKB + 'KB → ' + newKB + 'KB (' + ratio + '%)';

          const btn = document.createElement('button');
          btn.textContent = '下载';
          btn.onclick = () => {
            const a = document.createElement('a');
            a.href = url;
            a.download = file.name.replace(/\.[^.]+$/, '') + '_compressed.jpg';
            a.click();
          };

          item.appendChild(preview);
          item.appendChild(info);
          item.appendChild(btn);
          results.appendChild(item);
        }, 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
</script>
</body>
</html>
